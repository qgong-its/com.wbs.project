<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WBS Primer Project</title>
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <header class="page-header">
      <div class="page-header__inner content-width">
        <svg
          class="logo"
          class="w-6 h-6 text-gray-800 dark:text-white"
          aria-hidden="true"
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          fill="none"
          viewBox="0 0 24 24"
        >
          <path
            stroke="currentColor"
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="m8 8-4 4 4 4m8 0 4-4-4-4m-2-3-4 14"
          />
        </svg>

        <nav class="nav-main">
          <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#pricing">Pricing</a></li>
            <li><a href="#">Contact</a></li>
          </ul>
        </nav>
      </div>
    </header>
    <main>
      <section class="content">
        <div class="content__inner content-width">
          <h2 class="title-2">Main Content Heading</h2>
          <p>
            Space for more Components.<br />
            Each component is wrapped inside an section tag.
          </p>
        </div>
      </section>
      <section id="pricing" class="content pricing-section">
        <div class="content__inner content-width">
          <h2></h2>
          <div class="pricing-list">
            <div class="pricing-item">
              <h3 class="title-3">Basic Theme</h3>
              <p class="pricing-item__charge">$9.9/month</p>
            </div>
            <div class="pricing-item">
              <h3 class="title-3">Pro Theme</h3>
              <p class="pricing-item__charge">$19.99/month</p>
            </div>
            <div class="pricing-item">
              <h3 class="title-3">Enterprise Plan</h3>
              <p class="pricing-item__charge">Contact us for pricing</p>
            </div>
          </div>
        </div>
      </section>
    </main>
    <footer class="page-footer">
      <div class="page-footer__inner content-width">
        <p>&copy; 2026 My Portfolio. All rights reserved.</p>
      </div>
    </footer>
  </body>
</html>
